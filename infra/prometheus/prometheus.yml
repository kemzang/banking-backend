global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-actuator'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 'gateway-service:8080'
          - 'auth-service:8085'
          - 'account-service:8082'
          - 'transaction-service:8083'
          - 'loan-service:8084'
