# Nginx : sert l'app Angular (SPA) et relaie /api vers la gateway.
server {
    listen 80;
    server_name _;

    # DNS interne Docker : re-resout la gateway si son conteneur est recree.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy des appels API vers la gateway (reseau Docker / K8s)
    location /api/ {
        set $gateway http://gateway-service:8080;
        proxy_pass $gateway;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA : toute autre route renvoie index.html (routing Angular cote client)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
