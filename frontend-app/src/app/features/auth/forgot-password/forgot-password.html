<div class="forgot-container">
  <!-- Background -->
  <div class="forgot-bg"></div>
  
  <!-- Toolbar -->
  <div class="forgot-toolbar">
    <a routerLink="/auth/client" class="forgot-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      {{ t('back') }}
    </a>
    <div class="forgot-tools">
      <button class="forgot-tool" (click)="i18n.toggle()" [attr.aria-label]="'Language'">
        <span>{{ i18n.lang() === 'fr' ? 'EN' : 'FR' }}</span>
      </button>
      <button class="forgot-tool" (click)="theme.toggle()" [attr.aria-label]="t('theme_dark')">
        @if (theme.theme() === 'dark') {
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Main card -->
  <div class="forgot-card">
    
    <!-- State A: Email form -->
    @if (!sent()) {
      <div class="forgot-form">
        <div class="forgot-header">
          <div class="forgot-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" 
                    stroke="#00D4FF" stroke-width="2"/>
              <polyline points="22,6 12,13 2,6" stroke="#00D4FF" stroke-width="2"/>
            </svg>
          </div>
          <h1 class="forgot-title">{{ t('forgot_title') }}</h1>
          <p class="forgot-subtitle">{{ t('forgot_desc') }}</p>
        </div>

        @if (error()) {
          <div class="forgot-error" role="alert">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            {{ error() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()" class="forgot-form-content">
          <div class="forgot-field">
            <label for="email">{{ t('login_email') }}</label>
            <div class="forgot-input-wrapper">
              <svg class="forgot-input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/>
                <path d="m2 7 10 7 10-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              <input
                id="email"
                type="email"
                [value]="email()"
                (input)="onEmailChange($any($event.target).value)"
                [disabled]="loading()"
                [class.error]="error()"
                placeholder="votre@email.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <button type="submit" class="forgot-submit" [disabled]="loading() || !email().trim()">
            @if (loading()) {
              <span class="forgot-spinner"></span>
              {{ t('loading') }}
            } @else {
              {{ t('forgot_submit') }}
            }
          </button>
        </form>
      </div>
    }

    <!-- State B: Sent confirmation -->
    @if (sent()) {
      <div class="forgot-sent">
        <div class="forgot-sent-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" class="forgot-envelope">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" 
                  stroke="#00D4FF" stroke-width="2" fill="rgba(0,212,255,0.1)"/>
            <polyline points="22,6 12,13 2,6" stroke="#00D4FF" stroke-width="2"/>
            <path d="M9 11l2 2 4-4" stroke="#00D4FF" stroke-width="2.5" 
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <h2 class="forgot-sent-title">{{ t('forgot_title') }}</h2>
        <p class="forgot-sent-message">{{ t('forgot_sent') }}</p>

        <a routerLink="/auth/client" class="forgot-back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          {{ t('sign_in') }}
        </a>
      </div>
    }

  </div>
</div>
