<app-auth-layout accent="amber">

  <!-- ── LEFT ──────────────────────────────────────── -->
  <div slot="left" class="lo-left">
    <div class="lo-icon anim-fade-left" style="--delay:0ms">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <path d="M8 56V28l24-18 24 18v28H8Z" stroke="#F59E0B" stroke-width="2.5" stroke-linejoin="round"/>
        <rect x="22" y="34" width="20" height="22" rx="2" stroke="#F59E0B" stroke-width="2"/>
        <rect x="16" y="22" width="32" height="8" rx="2" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1.5"/>
        <circle cx="32" cy="26" r="2" fill="#F59E0B"/>
      </svg>
    </div>

    <h1 class="lo-title anim-fade-left" style="--delay:60ms">{{ t('op_portal') }}</h1>

    <ul class="lo-types anim-fade-left" style="--delay:120ms">
      <li>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="#F59E0B" stroke-width="1.8" stroke-linejoin="round"/>
          <rect x="9" y="12" width="6" height="9" stroke="#F59E0B" stroke-width="1.8" rx="1"/>
        </svg>
        {{ t('op_type_bank') }}
      </li>
      <li>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="6" width="18" height="14" rx="2" stroke="#F59E0B" stroke-width="1.8"/>
          <path d="M3 10h18" stroke="#F59E0B" stroke-width="1.8"/>
          <circle cx="8" cy="14" r="1.5" fill="#F59E0B"/>
        </svg>
        {{ t('op_type_micro') }}
      </li>
      <li>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="7" y="2" width="10" height="20" rx="3" stroke="#F59E0B" stroke-width="1.8"/>
          <circle cx="12" cy="17" r="1.5" fill="#F59E0B"/>
        </svg>
        {{ t('op_type_mobile') }}
      </li>
    </ul>

    <p class="lo-note anim-fade-left" style="--delay:200ms">{{ t('op_note') }}</p>
  </div>

  <!-- ── RIGHT ─────────────────────────────────────── -->
  <div slot="right">
    <h2 class="af-page-title">{{ t('op_title') }}</h2>
    <p class="af-page-sub">{{ t('op_subtitle') }}</p>

    <app-auth-form
      portal="operator"
      accent="amber"
      [showTabs]="true"
      [showForgot]="true"
      [showRegister]="false"
      [showOpCode]="true">
    </app-auth-form>

    <!-- Info box -->
    <div class="lo-info-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
        <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      {{ t('op_no_access') }}
    </div>
  </div>

</app-auth-layout>
