# =====================================================================
#  Plateforme Bancaire Distribuee — orchestration locale (developpement)
#  Lancement :   docker compose up --build
#  Variables    : voir .env (copier .env.example -> .env)
# =====================================================================

services:

  # ------------------ INFRASTRUCTURE ------------------

  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-bank}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bank}
    ports:
      # 5433 cote machine (5432 est deja pris par un PostgreSQL local).
      # En interne, les conteneurs utilisent toujours postgres:5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Cree une base par service au premier demarrage
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bank}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bank-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bank-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"     # protocole AMQP
      - "15672:15672"   # console d'administration : http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [bank-net]

  # ------------------ SOCLE MICROSERVICES ------------------

  config-service:
    build: ./microservices-backend/config-service
    container_name: bank-config
    ports:
      - "8888:8888"
    networks: [bank-net]

  discovery-service:
    build: ./microservices-backend/discovery-service
    container_name: bank-discovery
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URI: http://config-service:8888
    depends_on:
      - config-service
    networks: [bank-net]

  gateway-service:
    build: ./microservices-backend/gateway-service
    container_name: bank-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-change-me-une-cle-secrete-de-256-bits-minimum-pour-le-tp-inf462}
    depends_on:
      - discovery-service
    networks: [bank-net]

  # ------------------ SERVICES METIER (Java) ------------------

  auth-service:
    build: ./microservices-backend/auth-service
    container_name: bank-auth
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_auth_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-bank}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-change-me-une-cle-secrete-de-256-bits-minimum-pour-le-tp-inf462}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks: [bank-net]

  customer-service:
    build: ./microservices-backend/customer-service
    container_name: bank-customer
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_customer_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-bank}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks: [bank-net]

  account-service:
    build: ./microservices-backend/account-service
    container_name: bank-account
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_account_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-bank}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-bank}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks: [bank-net]

  transaction-service:
    build: ./microservices-backend/transaction-service
    container_name: bank-transaction
    ports:
      - "8083:8083"
    environment:
      # noms de variables attendus par transaction-service (application.yml)
      DB_URL: jdbc:postgresql://postgres:5432/bank_transaction_db
      DB_USERNAME: ${DB_USER:-bank}
      DB_PASSWORD: ${DB_PASSWORD:-bank}
      EUREKA_URL: http://discovery-service:8761/eureka
      # Publication des evenements vers RabbitMQ (exchange banking.events) -> notification-service
      TRANSACTION_EVENTS_BROKER: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks: [bank-net]

  loan-service:
    build: ./microservices-backend/loan-service
    container_name: bank-loan
    ports:
      - "8084:8084"
    environment:
      # loan-service active le profil 'docker' (cf. Dockerfile) : url/eureka viennent
      # de application-docker.yml ; on fournit juste les identifiants BDD.
      DB_USERNAME: ${DB_USER:-bank}
      DB_PASSWORD: ${DB_PASSWORD:-bank}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks: [bank-net]

  # ------------------ SERVICES POLYGLOTTES ------------------

  notification-service:
    build: ./notification-service
    container_name: bank-notification
    ports:
      - "3000:3000"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      # SMTP optionnel : sans ces variables, le service utilise Ethereal (mailbox de test)
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [bank-net]

  ai-document-service:
    build: ./ai-document-service
    container_name: bank-ai
    ports:
      - "8001:8001"
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
      DATABASE_URL: sqlite:///./storage/app.db
    volumes:
      - ./ai-document-service/storage:/app/storage
      - ./ai-document-service/app/storage:/app/app/storage
    networks: [bank-net]

  # ------------------ FRONTEND ------------------

  frontend-app:
    build: ./frontend-app
    container_name: bank-frontend
    ports:
      - "4200:80"          # http://localhost:4200 -> Nginx (relaie /api vers la gateway)
    depends_on:
      - gateway-service
    networks: [bank-net]

  # ------------------ OBSERVABILITE ------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: bank-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [bank-net]

  grafana:
    image: grafana/grafana:latest
    container_name: bank-grafana
    ports:
      - "3001:3000"      # http://localhost:3001 (admin/admin)
    depends_on:
      - prometheus
    networks: [bank-net]

networks:
  bank-net:
    driver: bridge

volumes:
  pgdata:
