  # ai-document-service:
  #   build: ./ai-document-service
  #   container_name: bank-ai
  #   ports:
  #     - "8000:8000"
  #   networks: [bank-net]

networks:
  bank-net:
    driver: bridge

volumes:
  pgdata:
