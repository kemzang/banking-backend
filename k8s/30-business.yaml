# Services metier Java
# --- auth-service ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: banking }
spec:
  replicas: 1
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: plateforme-bancaire-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8085 }]
          env:
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://postgres:5432/bank_auth_db" }
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: bank-secret, key: DB_USER } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: bank-secret, key: DB_PASSWORD } } }
            - { name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE, valueFrom: { configMapKeyRef: { name: bank-config, key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE } } }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: bank-secret, key: JWT_SECRET } } }
            - { name: GOOGLE_CLIENT_ID, valueFrom: { secretKeyRef: { name: bank-secret, key: GOOGLE_CLIENT_ID } } }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: banking }
spec: { selector: { app: auth-service }, ports: [{ port: 8085, targetPort: 8085 }] }
---
