# --- transaction-service ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: transaction-service, namespace: banking }
spec:
  replicas: 1
  selector: { matchLabels: { app: transaction-service } }
  template:
    metadata: { labels: { app: transaction-service } }
    spec:
      containers:
        - name: transaction-service
          image: plateforme-bancaire-transaction-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8083 }]
          env:
            - { name: DB_URL, value: "jdbc:postgresql://postgres:5432/bank_transaction_db" }
            - { name: DB_USERNAME, valueFrom: { secretKeyRef: { name: bank-secret, key: DB_USER } } }
            - { name: DB_PASSWORD, valueFrom: { secretKeyRef: { name: bank-secret, key: DB_PASSWORD } } }
            - { name: EUREKA_URL, valueFrom: { configMapKeyRef: { name: bank-config, key: EUREKA_URL } } }
            - { name: TRANSACTION_EVENTS_BROKER, valueFrom: { configMapKeyRef: { name: bank-config, key: TRANSACTION_EVENTS_BROKER } } }
            - { name: SPRING_RABBITMQ_HOST, valueFrom: { configMapKeyRef: { name: bank-config, key: SPRING_RABBITMQ_HOST } } }
            - { name: SPRING_RABBITMQ_USERNAME, valueFrom: { secretKeyRef: { name: bank-secret, key: RABBITMQ_USER } } }
            - { name: SPRING_RABBITMQ_PASSWORD, valueFrom: { secretKeyRef: { name: bank-secret, key: RABBITMQ_PASSWORD } } }
