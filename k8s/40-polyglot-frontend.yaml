# Services polyglottes (Python OCR, Node notifications) + frontend Nginx + Ingress
# --- ai-document-service (Python/OCR) ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: ai-document-service, namespace: banking }
spec:
  replicas: 1
  selector: { matchLabels: { app: ai-document-service } }
  template:
    metadata: { labels: { app: ai-document-service } }
    spec:
      containers:
        - name: ai-document-service
          image: plateforme-bancaire-ai-document-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8001 }]
          env:
            - { name: TESSERACT_CMD, value: "/usr/bin/tesseract" }
            - { name: DATABASE_URL, value: "sqlite:///./storage/app.db" }
---
apiVersion: v1
kind: Service
metadata: { name: ai-document-service, namespace: banking }
spec: { selector: { app: ai-document-service }, ports: [{ port: 8001, targetPort: 8001 }] }
---
# --- notification-service (Node) ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: notification-service, namespace: banking }
spec:
  replicas: 1
  selector: { matchLabels: { app: notification-service } }
  template:
    metadata: { labels: { app: notification-service } }
    spec:
      containers:
        - name: notification-service
          image: plateforme-bancaire-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - { name: RABBITMQ_URL, value: "amqp://guest:guest@rabbitmq:5672" }
---
apiVersion: v1
kind: Service
metadata: { name: notification-service, namespace: banking }
spec: { selector: { app: notification-service }, ports: [{ port: 3000, targetPort: 3000 }] }
---
# --- frontend (Nginx) ---
apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend-app, namespace: banking }
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend-app } }
  template:
    metadata: { labels: { app: frontend-app } }
    spec:
      containers:
        - name: frontend-app
          image: plateforme-bancaire-frontend-app:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: frontend-app, namespace: banking }
spec: { selector: { app: frontend-app }, ports: [{ port: 80, targetPort: 80 }] }
---
# --- Ingress : expose le frontend (qui relaie /api vers la gateway) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-ingress
  namespace: banking
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: banking.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-app
                port: { number: 80 }
