server.port=${SERVER_PORT:8081}
spring.application.name=customer-service

# Connexion BDD (propre a ce service). Les valeurs sont externalisees :
# - en local (IDE)  : les defauts apres ':' sont utilises
# - en conteneur    : surchargees par les variables d'environnement (docker-compose / .env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_customer_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bank}
spring.jpa.hibernate.ddl-auto=update

# Liaison avec l'annuaire Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

services.auth.url=${AUTH_SERVICE_URL:http://auth-service:8085}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://notification-service:3000}
