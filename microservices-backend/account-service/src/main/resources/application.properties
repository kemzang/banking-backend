server.port=${SERVER_PORT:8082}
spring.application.name=account-service

# Base de données dédiée (database per service)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_account_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bank}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Eureka — annuaire de services
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Observabilite : exposer les metriques Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
services.notification.url=${NOTIFICATION_SERVICE_URL:http://notification-service:3000}
