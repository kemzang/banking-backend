spring.application.name=discovery-service

# Valeurs LOCALES de secours : garantissent que discovery demarre correctement
# meme si le config-server est indisponible. Le config-server, quand il repond,
# SURCHARGE ces valeurs (l'import a une priorite plus haute).
server.port=8761
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.server.enable-self-preservation=false

# Configuration centralisee (config-service). 'optional:' => ne bloque pas le
# demarrage si le serveur tarde. URL surchargeable par variable d'env (Docker).
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
