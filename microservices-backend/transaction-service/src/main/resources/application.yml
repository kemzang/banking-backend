server:
  port: 8083

spring:
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bank_transaction_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:sigl}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

transaction:
  limits:
    max-amount: ${TRANSACTION_MAX_AMOUNT:1000000}
  commission:
    percentage: ${TRANSACTION_COMMISSION_PERCENTAGE:0.005}
    same-operator-percentage: ${TRANSACTION_SAME_OPERATOR_COMMISSION_PERCENTAGE:0}
  events:
    broker: ${TRANSACTION_EVENTS_BROKER:log}
    topic-completed: transaction.completed
    topic-rejected: transaction.rejected
    topic-compensation: transaction.compensation.requested

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Resilience : circuit breaker sur les appels a account-service.
# Les exceptions metier sont ignorees (ne doivent pas ouvrir le circuit).
resilience4j:
  circuitbreaker:
    instances:
      account:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        ignore-exceptions:
          - com.banking.transaction_service.exception.SoldeInsuffisantException
          - com.banking.transaction_service.exception.DeviseIncompatibleException
          - com.banking.transaction_service.exception.InvalidTransactionException
          - com.banking.transaction_service.exception.TransactionLimitExceededException
