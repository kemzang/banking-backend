server.port=${SERVER_PORT:8085}
spring.application.name=auth-service

# Connexion BDD (propre a ce service). Les valeurs sont externalisees :
# - en local (IDE)  : les defauts apres ':' sont utilises
# - en conteneur    : surchargees par les variables d'environnement (docker-compose / .env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_auth_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bank}
spring.jpa.hibernate.ddl-auto=update

# Liaison avec l'annuaire Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Secret de signature des jetons JWT (a externaliser/changer en production)
app.jwt.secret=${JWT_SECRET:change-me-une-cle-secrete-de-256-bits-minimum-pour-le-tp-inf462}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Connexion Google (Sign in with Google). Renseigner l'ID client OAuth Google.
# Sans cette valeur, l'endpoint /api/auth/google renvoie 503 (fonctionnalite desactivee).
app.google.client-id=${GOOGLE_CLIENT_ID:}
